<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Centered Login Form</title>
    
    

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    
</head>
<body>

    <!-- Full page center -->
    <div class="container-fluid h-100">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="login-container text-center">

                <h4 class="mb-4 text-primary fw-bold">
                    KoMiCo Login Page</h4>

                <form>
                    <!-- Input Group for ID and Password -->
                    <div class="input-group-custom">
                        <!-- ID -->
                        <div class="mb-3 text-start">
                            <label class="form-label">ID</label>
                            <div class="input-wrapper">
                            <input type="text" class="form-control" id="idInput">
                            <span class="clear-input" id="clearId" onclick="clearInput('idInput')" style="display: none;">&times;</span>
                            </div>
                            <div class="input-hint">Enter your ID</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3 text-start">
                            <label class="form-label">Password</label>
                            <div class="input-wrapper">
                            <input type="password" class="form-control" id="passwordInput">
                            <span class="clear-input" id="clearPassword" onclick="clearInput('passwordInput')" style="display: none;">&times;</span>
                            </div>
                            <div class="input-hint">Enter your password</div>
                        </div>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn  w-100 mb-3">Login</button>

                    <!-- Links -->
                    <div class="d-flex justify-content-center gap-3">
                        <a href="#" class="text-decoration-none">Sign Up</a>
                        <a href="#" class="text-decoration-none">Find ID</a>
                        <a href="#" class="text-decoration-none">Reset Password</a>
                    </div>
                </form>

                <!-- Footer -->
                <div class="mt-4 small text-muted">
                    <br>
                    © AICESS, All Rights Reserved.
                    <br>
                    <a href="#" class="text-decoration-none">Terms of Service</a> |      
                    <a href="#" class="text-decoration-none">Privacy Policy</a>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
