    <script>
        $(document).ready(function () {

            // duration-radio script
            $('.duration-radio').click(function () {
                // Remove active from all radio labels
                $('.duration-radio').removeClass('active');
                // Add active to clicked label
                $(this).addClass('active');
                // Set the corresponding radio input as checked
                const radioId = $(this).attr('for');
                $('#' + radioId).prop('checked', true);
                // Call setDuration with the correct value
                const duration = $(this).data('duration');
                setDuration(duration);
            });
            $('#resetBtn').on('click', function () {
                clearFilterData();
            });
            function clearFilterData() {
                $('#searchKeyword').val('');
            }

            $('#select-1').select2({
                placeholder: '선택',
                width: '100%',
                height: '100%',
                minimumResultsForSearch: Infinity, // 🔥 No search box
            });
            $('#select-2').select2({
                placeholder: '외주업체',
                width: '100%',
                height: '100%',
                minimumResultsForSearch: Infinity, // 🔥 No search box
            });


        });

        // date range script

        tui.DatePicker.localeTexts['customKey'] = {
            titles: {
                // days
                DD: ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
                // daysShort
                D: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                // months
                MMMM: [
                    'January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'
                ],
                // monthsShort
                MMM: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
            },
            titleFormat: 'yyyy-MM',
            todayFormat: 'D, MMMM dd, yyyy',
            date: 'Date',
            time: 'Time'
        };
        var today = new Date();
        var picker = tui.DatePicker.createRangePicker({
            startpicker: {
                date: today,
                input: '#startpicker-input',
                container: '#startpicker-container'
            },
            endpicker: {
                date: today,
                input: '#endpicker-input',
                container: '#endpicker-container'
            },
            format: 'YYYY-MM-dd',
            timePicker: false,
            language: 'customKey'
        });


        // date range script
        function setDuration(duration) {
            const today = new Date();
            let startDate = new Date();
            let endDate = new Date();

            if (duration === 'today') {
                startDate = today;
                endDate = today;
            } else if (duration === '1week') {
                startDate = new Date(today.setDate(today.getDate() - 7));
                endDate = new Date();
            } else if (duration === '1month') {
                startDate = new Date(today.setMonth(today.getMonth() - 1));
                endDate = new Date();
            } else if (duration === '2month') {
                startDate = new Date(today.setMonth(today.getMonth() - 2));
                endDate = new Date();
            }

            picker.setStartDate(startDate);
            picker.setEndDate(endDate);
        }

        // duration btn script
        $('.duration-btn').click(function () {
            $(this).addClass('active');
            $(this).siblings().removeClass('active');
        });
        // duration btn script end


        // table script
        const Grid = tui.Grid;
        Grid.applyTheme('clean', {
            cell: {
                header: {
                    background: '#F5F5F7',
                    height: 46,
                    verticalAlign: 'middle',
                    border: '#EEEEEE',
                },
                normal: {
                    height: 46,
                    verticalAlign: 'middle',
                    border: '#EEEEEE',
                    showHorizontalBorder: true,
                    showVerticalBorder: true,
                }
            }
        });
        const grid = new Grid({
            el: document.getElementById('grid'),
            data: [
                { no: 1, partCode: 'S1234546', partName: '(R)PAT_SUS Wall Liner_Al203+5F', registerName: '홍길동', registerDate: '2025.05.26' },
            ],
            pageOptions: {
                useClient: true,
                perPage: 10
            },
            columns: [
                { header: '번호', name: 'no', width: 80, align: 'center' },
                { header: 'Part 코드', name: 'partCode', align: 'center', width: 140 },
                { header: 'Part 명', name: 'partName', align: 'left' },
                { header: '등록자', name: 'registerName', align: 'center', width: 120 },
                { header: '등록일자', name: 'registerDate', align: 'center', width: 120 },
            ],
            rowHeight: 'auto',
            themeOptions: {
                cell: {
                    header: {
                        background: '#F5F5F7',
                        height: 46,
                        verticalAlign: 'middle',
                        border: '#EEEEEE',
                    },
                    normal: {
                        height: 46,
                        verticalAlign: 'middle',
                        border: '#EEEEEE',
                        showHorizontalBorder: true,
                        showVerticalBorder: true,
                    }
                }
            },
            scrollX: false,
            scrollY: false,
        });

        // Example: Get value and text by custom dropdown id
        function getDropdownValueAndText(dropdownId) {
            var dropdown = document.querySelector('[data-dropdown-id="' + dropdownId + '"]');
            if (!dropdown) return null;
            var selected = dropdown.querySelector('.dropdown-item.selected');
            if (selected) {
                return { value: selected.dataset.value, text: selected.textContent };
            }
            return null;
        }

    </script>
