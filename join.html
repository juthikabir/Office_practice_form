<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Centered Login Form</title>
    
    

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="accede/css/style.css">

    
</head>
<body>

    <!-- Full page center -->
    <div class="container-fluid h-100">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="login-container text-center">

                <h4 class="mb-4 text-primary fw-bold">KoMiCo Login Page</h4>

                <form id="firstForm" class="d-none"> <!--d-none for by default hide the forms-->
                    <!-- Input Group for ID and Password -->
                    <div class="input-group-custom">
                        <!-- ID -->
                        <div class="mb-3 text-start">
                            <label class="form-label">ID</label>
                            <div class="input-wrapper">
                            <input type="text" class="form-control" id="loginIdInput">
                            <span class="clear-input" id="clearLoginId" onclick="clearInput('loginIdInput')" style="display: none;">&times;</span>
                            </div>
                            <div class="input-hint">Enter your ID</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3 text-start">
                            <label class="form-label">Password</label>
                            <div class="input-wrapper">
                            <input type="password" class="form-control" id="loginPasswordInput">
                            <span class="clear-input" id="clearLoginPassword" onclick="clearInput('loginPasswordInput')" style="display: none;">&times;</span>
                            </div>
                            <div class="input-hint">Enter your password</div>
                        </div>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn  w-100 mb-3">Login</button>

                    <!-- Links -->
                    <div class="d-flex justify-content-center gap-3">
                        <a href="join.html?type=login" class="text-decoration-underline">Sign Up</a>
                        <a href="#" class="text-decoration-underline">Find ID</a>
                        <a href="#" class="text-decoration-underline">Reset Password</a>
                    </div>
                </form>

                <!----Register Form-->
                <form id="secondForm" class="d-none">
                    <!-- Input Group for ID and Password -->
                    <div class="input-group-custom">
                        <!-- ID -->
                        <div class="mb-3 text-start">
                            <label class="form-label">ID</label>
                            <div class="input-wrapper">
                            <input type="text" class="form-control" id="idInput">
                            <span class="clear-input" id="clearId" onclick="clearInput('idInput')" style="display: none;">&times;</span>
                            </div>
                            <div class="input-hint">Enter your ID</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3 text-start">
                            <label class="form-label">Password</label>
                            <div class="input-wrapper">
                            <input type="password" class="form-control" id="passwordInput">
                            <span class="clear-input" id="clearPassword" onclick="clearInput('passwordInput')" style="display: none;">&times;</span>
                            </div>
                            <div class="input-hint">Enter your password</div>
                        </div>
                    </div>

                    <!-- confirm Password -->
                        <div class="mb-3 text-start">
                            <label class="form-label"> Confirm Password</label>
                            <div class="input-wrapper">
                            <input type="password" class="form-control" id="passwordInput">
                            <span class="clear-input" id="clearPassword" onclick="clearInput('passwordInput')" style="display: none;">&times;</span>
                            </div>
                            <div class="input-hint">Enter your password</div>
                        </div>
                    

                    <!-- Register Button -->
                    <button type="submit" class="btn  w-100 mb-3">Register</button>

                    <!-- Links -->
                    <div class="d-flex justify-content-center gap-3">
                        <a href="join.html?type=register" class="text-decoration-underline">Sign Up</a>
                        <a href="#" class="text-decoration-underline">Find ID</a>
                        <a href="#" class="text-decoration-underline">Reset Password</a>
                    </div>
                </form>


                <!-- Footer -->
                <div class="mt-4 small text-muted">
                    <br>
                    © AICESS, All Rights Reserved.
                    <br>
                    <a href="#" class="text-decoration-underline">Terms of Service</a> |      
                    <a href="#" class="text-decoration-underline">Privacy Policy</a>
                </div>

            </div>
        </div>
    </div>

    <!-- Button trigger modal -->
<button type="button" class="launch button" data-bs-toggle="modal" data-bs-target="#customModal">
  Launch demo modal
</button>

    <!--Custom Modal-->
    <div class="modal fade custom-modal" id="customModal" tabindex="-1" aria-labelledby="customModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="modal-message" id="modalMessage">아이디 또는 비밀번호를 <br> 확인해 주세요.</div>

                    <button  class="btn btn-primary modal-close-button" type="button" data-bs-dismiss="modal"> 확인</button>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
       const url = new URL(window.location.href);
    const type = url.searchParams.get('type');

    console.log(type);
    if(type=="login"){
      document.getElementById('firstForm').classList.remove('d-none');
    }
    else if(type=="register"){
        document.getElementById('secondForm').classList.remove('d-none');
    }
    </script>
    <script src="accede/js/script.js"></script>
</body>
</html>
